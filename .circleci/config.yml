version: 2.1

orbs:
  win: circleci/windows@2.4.0

aliases:
  - &build-command
    name: Build
    command: |
      GYP_ARGS=""
      if [[ "${ELECTRON_VERSION}" ]]; then
        GYP_ARGS="--runtime=electron --target=${ELECTRON_VERSION} --dist-url=https://electronjs.org/headers"
      fi
      if [[ "${BUILD_ARM64}" == "true" ]]; then
        GYP_ARGS="${GYP_ARGS} --target_arch=arm64"
      fi
      pnpm exec node-pre-gyp rebuild package testpackage $GYP_ARGS

  - &build-command-windows
    name: Build
    shell: bash.exe
    command: |
      export PATH=/c/nodejs:$PATH
      GYP_ARGS=""
      if [[ "${ELECTRON_VERSION}" ]]; then
        GYP_ARGS="--runtime=electron --target=${ELECTRON_VERSION} --dist-url=https://electronjs.org/headers"
      fi
      if [[ "${BUILD_ARM64}" == "true" ]]; then
        GYP_ARGS="${GYP_ARGS} --target_arch=arm64"
      fi
      pnpm exec node-pre-gyp rebuild package testpackage $GYP_ARGS

  - &publish-command
    name: Publish
    command: |
      GYP_ARGS=""
      if [[ "${ELECTRON_VERSION}" ]]; then
        GYP_ARGS="--runtime=electron --target=${ELECTRON_VERSION} --dist-url=https://electronjs.org/headers"
      fi
      if [[ "${BUILD_ARM64}" == "true" ]]; then
        GYP_ARGS="${GYP_ARGS} --target_arch=arm64"
      fi
      COMMIT_MESSAGE=`git log --format=%s -n 1 $CIRCLE_SHA1`
      if [[ ${COMMIT_MESSAGE} =~ "[publish binary]" ]] && [[ "$PUBLISH" == "true" ]]; then
        pnpm exec node-pre-gyp publish $GYP_ARGS
      else
        echo "Not a tagged build - not publishing"
      fi

  - &publish-command-windows
    name: Publish
    shell: bash.exe
    command: |
      GYP_ARGS=""
      if [[ "${ELECTRON_VERSION}" ]]; then
        GYP_ARGS="--runtime=electron --target=${ELECTRON_VERSION} --dist-url=https://electronjs.org/headers"
      fi
      if [[ "${BUILD_ARM64}" == "true" ]]; then
        GYP_ARGS="${GYP_ARGS} --target_arch=arm64"
      fi
      export PATH=/c/nodejs:$PATH
      COMMIT_MESSAGE=`git log --format=%s -n 1 $CIRCLE_SHA1`
      if [[ ${COMMIT_MESSAGE} =~ "[publish binary]" ]] && [[ "$PUBLISH" == "true" ]]; then
        pnpm exec node-pre-gyp publish $GYP_ARGS
      else
        echo "Not a tagged build - not publishing"
      fi

  - &common-build
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      # Install git-lfs (not part of the standard Docker images)- run: sudo apt-get update
      - run: curl -sSL https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | sudo bash
      - run: sudo apt-get update && sudo apt-get install -y git-lfs && git-lfs install --force && git-lfs pull
      - run: corepack enable && corepack prepare pnpm@10.14.0 --activate
      - run: npm_config_build_from_source=true pnpm install --frozen-lockfile
      - run: *build-command

      - run: pnpm test
      - run: *publish-command


  - &common-electron-linux
    resource_class: large
    docker:
      - image: cimg/node:24.14.0

    working_directory: ~/repo

    steps:
      - checkout
      # Install git-lfs (not part of the standard Docker images)
      - run: curl -sSL https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | sudo bash
      - run: sudo apt-get update && sudo apt-get install -y git-lfs && git-lfs install --force && git-lfs pull
      # These are required for electron(-mocha)
      - run: sudo apt-get install -y libgtk2.0-0 libgtk-3-dev libxtst6 libxss1 libgconf2-dev libnss3 libasound2
      - run:
          name: Install
          command: |
            node -v
            corepack enable
            corepack prepare pnpm@10.14.0 --activate
            pnpm install --frozen-lockfile
            pnpm add --save-dev electron@$ELECTRON_VERSION
      - run: *build-command
      - run: pnpm run pretest
      - run: xvfb-run pnpm exec electron-mocha --timeout 480000
      - run: *publish-command

  - &common-macos
    macos:
      xcode: "13.1.0"
    steps:
      - checkout
      - run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install git-lfs || true
      - run: git lfs install
      - run: git lfs pull
      - run:
          name: Install Node
          command: |
            source ~/.bash_profile

            # Install the correct Node version
            curl --silent -o node.tar.xz https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION-darwin-x64.tar.xz
            tar xf node.tar.xz
            echo 'export NODE_PATH=$HOME/node' >> $BASH_ENV
            echo 'export PATH=$NODE_PATH/bin:$PATH' >> $BASH_ENV
            source $BASH_ENV
            mv node-v$NODE_VERSION-darwin-x64 $NODE_PATH
            node -v
            corepack enable
            corepack prepare pnpm@10.14.0 --activate
            pnpm -v

      - run:
          name: Install & Build
          command: |
            node -v
            npm_config_build_from_source=true pnpm install --frozen-lockfile
      - run: *build-command
      - run:
          name: Run Tests
          command: |
            if [[ "${SKIP_TEST}" != "true" ]]; then
              pnpm test
            fi
      - run: *publish-command

  - &common-electron-macos
    macos:
      xcode: "13.1.0"
    steps:
      - checkout
      - run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install git-lfs || true
      - run: git lfs install
      - run: git lfs pull
      - run:
          name: Install Node
          command: |
            source ~/.bash_profile

            # Install the correct Node version
            curl --silent -o node.tar.xz https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION-darwin-x64.tar.xz
            tar xf node.tar.xz
            echo 'export NODE_PATH=$HOME/node' >> $BASH_ENV
            echo 'export PATH=$NODE_PATH/bin:$PATH' >> $BASH_ENV
            source $BASH_ENV
            mv node-v$NODE_VERSION-darwin-x64 $NODE_PATH
            node -v
            corepack enable
            corepack prepare pnpm@10.14.0 --activate
            pnpm -v

      - run:
          name: Install
          command: |
            node -v
            pnpm install --frozen-lockfile
            pnpm add --save-dev electron@$ELECTRON_VERSION

      - run: *build-command
      - run: pnpm run pretest
      - run: pnpm exec electron-mocha --timeout 480000
      - run:
          <<: *publish-command

  - &common-windows
    working_directory: c:\\project
    executor:
      name: win/default
    steps:
      - checkout
      - run:
          name: Setup
          command: |
            $ErrorActionPreference = 'Stop'; $ProgressPreference = 'SilentlyContinue';
            cd \tmp
            Invoke-WebRequest $('https://nodejs.org/dist/v{0}/node-v{0}-win-{1}.zip' -f $env:NODE_VERSION,$env:NODE_ARCH) -OutFile 'node.zip' -UseBasicParsing
            Expand-Archive node.zip -DestinationPath C:\
            Rename-Item -Path $('C:\node-v{0}-win-{1}' -f $env:NODE_VERSION,$env:NODE_ARCH) -NewName 'C:\nodejs'

            $env:PATH = 'C:\nodejs;{0}' -f $env:PATH
            [Environment]::SetEnvironmentVariable('PATH', $env:PATH, [EnvironmentVariableTarget]::Machine)

            corepack enable
            corepack prepare pnpm@10.14.0 --activate
            pnpm -v

            node -v
      - run:
          name: Install
          command: |
            $env:npm_config_build_from_source = 'true'
            pnpm install --frozen-lockfile
      - run: *build-command-windows
      - run:
          name: Test
          shell: bash.exe
          command: |
            export PATH=/c/nodejs:$PATH
            if [[ "${SKIP_TEST}" != "true" ]]; then
              pnpm test
              pnpm exec electron-mocha --timeout 480000
            fi
      - run: *publish-command-windows
      - store_artifacts:
          path: c:\\project\\lib\\binding
# These tests pass, but exit with code 1 on Windows. Disable for now
#      - run:
#          name: Test Electron
#          command: |
#            ./node_modules/.bin/electron "test/support/createdb-electron.js"
#            ./node_modules/.bin/electron-mocha --timeout 480000
jobs:
  build-24:
    <<: *common-build
    environment:
      PUBLISH: true
      ELECTRON_VERSION: "41.0.0"
    docker:
      - image: cimg/node:24.14.0

  # Node version should match electron's node version.
  # See https://github.com/mapbox/node-sqlite3/pull/1367
  build-electron-41:
    <<: *common-electron-linux
    docker:
      - image: cimg/node:24.14.0
    environment:
      ELECTRON_VERSION: "41.0.0"


  build-macos-24:
    <<: *common-macos
    environment:
      PUBLISH: true
      NODE_VERSION: "24.14.0"
      ELECTRON_VERSION: "41.0.0"

  build-macos-24-arm64:
    <<: *common-macos
    environment:
      PUBLISH: true
      NODE_VERSION: "24.14.0"
      ELECTRON_VERSION: "41.0.0"
      BUILD_ARM64: true
      SKIP_TEST: true

  # NODE_VERSION should match electron's node version.
  # See https://github.com/mapbox/node-sqlite3/pull/1367

  # Build the published N-API 6 binaries
  windows-24_x86:
    <<: *common-windows
    environment:
      NODE_VERSION: "24.14.0"
      NODE_ARCH: x86
      PUBLISH: true
      ELECTRON_VERSION: "41.0.0"
      BUILD_ARM64: false

  windows-24_x64:
    <<: *common-windows
    environment:
      NODE_VERSION: "24.14.0"
      NODE_ARCH: x64
      PUBLISH: true
      ELECTRON_VERSION: "41.0.0"
      BUILD_ARM64: false

  windows-24_arm64:
    <<: *common-windows
    environment:
      NODE_VERSION: "24.14.0"
      NODE_ARCH: x64
      PUBLISH: true
      ELECTRON_VERSION: "41.0.0"
      BUILD_ARM64: true
      SKIP_TEST: true # We can build for arm64, but can't run arm64.

workflows:
  version: 2
  build_all:
    jobs:
      - build-24
      - build-electron-41
      - build-macos-24-arm64
      - build-macos-24
      - windows-24_x86
      - windows-24_x64
      - windows-24_arm64
